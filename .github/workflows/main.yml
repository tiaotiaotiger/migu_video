name: workflow-task

on: 
  # cron 始终按 UTC；列表里的「开始时间」是实际排队到 runner 的时刻。
  # GitHub 在负载高时可能把 schedule 推迟数分钟到数小时（官方文档说明），因此间隔看起来会不均匀。
  schedule: 
    - cron: '11 * * * *'
  workflow_dispatch:
  repository_dispatch: 
    types: [tvcron]
    
# 防止并发：如果新任务触发，取消掉正在运行的旧任务
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
  
jobs:
  main:
    name: Fetch And Modify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ONLY_UPDATE_MIGU: false
      # MIGU.py：设为 "1" 时在日志中打印每个频道的节目单/playurl 请求与解析后响应（便于排查）；默认 "0" 避免日志膨胀。
      # 勿长期开启；勿设 MIGU_DEBUG_HTTP_FULL=1 于公开仓库（Apipost 请求体含 token）。
      MIGU_DEBUG_HTTP: "0"
      MIGU_DEBUG_HTTP_MAX: "2000"

    steps: 
      - name: Checkout code
        uses: actions/checkout@v5

      # 上海时间 01:00–05:59 不抓取、不提交（schedule / 手动 / dispatch 均生效）
      - name: Check Shanghai quiet hours
        id: shanghai_quiet
        run: |
          H=$(TZ=Asia/Shanghai date +%H)
          H=$((10#$H))
          if [[ $H -ge 1 && $H -lt 6 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "当前为上海时间 ${H} 点（凌晨 1–5 点），跳过抓取与提交。"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dependencies
        if: steps.shanghai_quiet.outputs.skip != 'true'
        run: pip install requests

      - name: Initial Run
        if: steps.shanghai_quiet.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./run_test.sh
