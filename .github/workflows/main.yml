name: workflow-task

on: 
  schedule: 
    - cron: '11 * * * *'
  workflow_dispatch:
  repository_dispatch: 
    types: [tvcron]
    
# 防止并发：如果新任务触发，取消掉正在运行的旧任务
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
  
jobs:
  main:
    name: Fetch And Exec Job
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ONLY_UPDATE_MIGU: false

    steps: 
      - name: Checkout code
        uses: actions/checkout@v5

      # 上海时间 01:00–05:59 不抓取、不提交（schedule / 手动 / dispatch 均生效）
      - name: Check Shanghai quiet hours
        id: shanghai_quiet
        run: |
          H=$(TZ=Asia/Shanghai date +%H)
          H=$((10#$H))
          if [[ $H -ge 1 && $H -lt 6 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "当前为上海时间 ${H} 点（凌晨 1–5 点），跳过抓取与提交。"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dependencies
        if: steps.shanghai_quiet.outputs.skip != 'true'
        run: pip install requests

      - name: Initial Run
        if: steps.shanghai_quiet.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./run_test.sh
