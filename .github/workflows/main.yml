name: workflow-task-delay

on: 
  schedule: 
    - cron: '38 * * * *'
  workflow_dispatch:

    
# 防止并发：如果新任务触发，取消掉正在运行的旧任务
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
  
jobs:
  main:
    name: Fetch And Modify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ONLY_UPDATE_MIGU: false

    steps: 
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Dependencies
        run: pip install requests

      # --- 第一次执行：初始任务 ---
      - name: Initial Run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./run_test.sh

      # --- 延时逻辑：在 UTC 23, 00, 01, 02（北京约 7–10 点）进行 4 次「每到 xx:30:10」同步---
      - name: Precision Hourly Sync
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_HOUR=$(date -u +"%H")
          
          if [[ "$CURRENT_HOUR" == "23" || "$CURRENT_HOUR" == "00" || "$CURRENT_HOUR" == "01" || "$CURRENT_HOUR" == "02" ]]; then
            echo "当前处于核心时段 ($CURRENT_HOUR 点)，启动 3 轮 UTC 半点+10s (xx:30:10) 同步..."
            
            for i in {1..3}; do
              # 睡到最近的 UTC xx:30:10（半点后错开 10 秒，减轻与整分整秒请求尖峰重叠）
              MIN=$(date -u +"%M")
              SEC=$(date -u +"%S")
              ELAPSED=$(( 10#$MIN * 60 + 10#$SEC ))
              HALF_MIN_SEC=1800
              ALIGN_OFFSET=10
              TARGET_IN_HOUR=$(( HALF_MIN_SEC + ALIGN_OFFSET ))
              if [[ "$ELAPSED" -lt "$TARGET_IN_HOUR" ]]; then
                SLEEP_SECONDS=$(( TARGET_IN_HOUR - ELAPSED ))
              else
                SLEEP_SECONDS=$(( 3600 - ELAPSED + TARGET_IN_HOUR ))
              fi

              echo "等待 $SLEEP_SECONDS 秒至下一个 UTC xx:30:${ALIGN_OFFSET}..."
              sleep $SLEEP_SECONDS
              
              echo "--- 开始第 $i 次半点同步 ---"
              # 每次循环前拉取最新脚本代码，确保逻辑是最新的
              git pull origin main --rebase || true
              
              # 执行脚本
              bash ./run_test.sh
            done
          else
            echo "非核心时段，无需延时。"
          fi
