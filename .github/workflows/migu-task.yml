name: migu-task
on: 
  #schedule: 
    #- cron: 0 * * * *
  workflow_dispatch:
  repository_dispatch: #允许外部触发,cf worker定时任务延迟在1分钟以内
    types: [mgcron]
jobs:
  main:
    name: update migu
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 总超时
    permissions:
      contents: write  # 允许推送代码
    steps: 
    - name: Checkout code
      uses: actions/checkout@v7
    - name: Setup Python
      run: |
          pip install requests futures
    - name: fetch and modify with Retry
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 5    # 单次尝试如果超过 5 分钟就判定为超时
        max_attempts: 2       # 超时后重试 1 次 
        retry_on: timeout     # 只有在超时的时候才触发重试
        retry_wait_seconds: 30   # 每次重试之间的等待间隔 
        command: |
          python MIGU.py
          python sort_m3u.py
          
    - name: CommitAndPush
      run: |
        # 获取仓库名称（${VAR#*/} 是 Bash 的字符串操作，去掉 owner/ 前缀）
        REPO_NAME="${GITHUB_REPOSITORY#*/}"
        git config --global user.email "github@github.com"
        git config --global user.name "Github Actions"
        
        # 克隆仓库（使用 HTTPS + TOKEN 避免权限问题）
        git clone "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        cd "$REPO_NAME" || exit 1  # 强制失败时退出

        # 从上级目录移动文件到当前子目录
        [ -f "../migu.m3u" ] && mv ../migu.m3u ./migu.m3u || true
        [ -f "../channels_pid.json" ] && mv ../channels_pid.json ./channels_pid.json || true
        
        git add .
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Update: $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        fi
