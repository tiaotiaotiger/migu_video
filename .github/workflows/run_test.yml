name: test rruuns

on: 
  schedule: 
    - cron: '36 * * * *'
  workflow_dispatch:
  repository_dispatch: 
    types: [tvcron]

jobs:
  main:
    name: Fetch And Modify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ONLY_UPDATE_MIGU: false

    steps: 
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Dependencies
        run: pip install requests

      # --- 第一次执行：初始任务 ---
      - name: Initial Run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./run_test.sh

      # --- 延时逻辑：在 UTC 23, 00, 01 时段进行 3 次整点追踪 ---
      - name: Precision Hourly Sync
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_HOUR=$(date -u +"%H")
          
          if [[ "$CURRENT_HOUR" == "23" || "$CURRENT_HOUR" == "00" || "$CURRENT_HOUR" == "01" ]]; then
            echo "当前处于核心时段 ($CURRENT_HOUR 点)，启动 3 小时整点追踪..."
            
            for i in {1..3}; do
              # 计算到下一个整点 (xx:00:10) 的秒数
              MIN=$(date -u +"%M")
              SEC=$(date -u +"%S")
              SLEEP_SECONDS=$(( 3600 - (10#$MIN * 60 + 10#$SEC) + 10 ))
              
              echo "等待 $SLEEP_SECONDS 秒至下一个整点..."
              sleep $SLEEP_SECONDS
              
              echo "--- 开始第 $i 次整点同步 ---"
              # 每次循环前拉取最新脚本代码，确保逻辑是最新的
              git pull origin main --rebase || true
              
              # 执行脚本
              bash ./run_test.sh
            done
          else
            echo "非核心时段，无需延时。"
          fi
